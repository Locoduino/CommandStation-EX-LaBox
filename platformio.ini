; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = ESP32
src_dir = .
include_dir = .

[env]
build_flags = -Wall -Wextra -D ARDUINO_ARCH_ESP32 -D LABOX
monitor_filters = time
framework = arduino
lib_deps = 
	mathertel/OneButton@^2.6.1
	adafruit/Adafruit GFX Library@^1.12.0
	adafruit/Adafruit SSD1306@^2.5.14
	pierremolinaro/ACAN_ESP32@^1.1.2

[env:ESP32]
; Lock version to 6.7.0 as that is
; Arduino v2.0.16 (based on IDF v4.4.7)
; which is the latest version based
; on IDF v4. We can not use IDF v5.
platform = espressif32 @ 6.7.0
board = esp32dev
framework = arduino
lib_deps = ${env.lib_deps}
build_flags = -std=c++17 -Wall -Wextra -Wno-switch -D ARDUINO_ARCH_ESP32 -D LABOX
monitor_speed = 115200
monitor_echo = yes
;monitor_port = COM13
